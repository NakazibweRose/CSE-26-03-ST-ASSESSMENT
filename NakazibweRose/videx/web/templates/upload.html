{% extends 'base.html' %} {% block content %}
<div class="max-w-5xl mx-auto px-6 py-10">
  <!-- Page Title -->
  <h1 class="text-2xl font-bold text-gray-900 mb-8">Upload your video</h1>

  <form method="post" enctype="multipart/form-data" id="uploadForm" novalidate>
    {% csrf_token %}

    <div class="flex flex-col lg:flex-row gap-8">
      <!-- ===== LEFT COLUMN ===== -->
      <div class="flex-1 flex flex-col gap-4">
        <!-- Title -->
        <div>
          <input
            type="text"
            name="title"
            id="id_title"
            placeholder="Video Title"
            class="w-full border border-gray-300 rounded-xl px-4 py-4 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-red-500 transition text-sm"
          />
          <p
            class="text-red-500 text-xs mt-1 hidden flex items-center gap-1"
            id="err_title"
          >
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Required field
          </p>
        </div>

        <!-- Description -->
        <div>
          <textarea
            name="description"
            id="id_description"
            placeholder="Description (Optional)"
            rows="8"
            class="w-full border border-gray-300 rounded-xl px-4 py-4 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-red-500 transition text-sm resize-none"
          ></textarea>
          <p
            class="text-red-500 text-xs mt-1 hidden flex items-center gap-1"
            id="err_description"
          >
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Required field
          </p>
        </div>

        <!-- Quality -->
        <div class="relative">
          <select
            name="quality"
            id="id_quality"
            class="w-full border border-gray-300 rounded-xl px-4 py-4 text-gray-800 focus:outline-none focus:border-red-500 transition text-sm appearance-none bg-white"
          >
            <option value="">Video Quality</option>
            <option value="360p">360p</option>
            <option value="720p">720p</option>
            <option value="1080p">1080p</option>
          </select>
          <div
            class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"
          >
            <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500"></i>
          </div>
          <p
            class="text-red-500 text-xs mt-1 hidden flex items-center gap-1"
            id="err_quality"
          >
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Required field
          </p>
        </div>

        <!-- Date of Publishing -->
        <div class="relative">
          <input
            type="text"
            name="publish_date"
            id="id_publish_date"
            placeholder="Date of Publishing"
            onfocus="this.type = 'date'"
            onblur="if (!this.value) this.type = 'text';"
            class="w-full border border-gray-300 rounded-xl px-4 py-4 text-gray-400 placeholder-gray-400 focus:outline-none focus:border-red-500 transition text-sm bg-white"
          />
          <div
            class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"
          >
            <i data-lucide="calendar-days" class="w-5 h-5 text-gray-400"></i>
          </div>
        </div>
        <p
          class="text-red-500 text-xs -mt-3 hidden flex items-center gap-1"
          id="err_publish_date"
        >
          <i data-lucide="alert-circle" class="w-3 h-3"></i> Required field
        </p>
      </div>

      <!-- ===== RIGHT COLUMN ===== -->
      <div class="w-full lg:w-96 flex flex-col gap-4">
        <!-- Upload Video -->
        <div>
          <div
            id="video_drop_area"
            onclick="document.getElementById('id_video_file').click()"
            class="w-full bg-white border-2 border-gray-200 rounded-2xl flex flex-col items-center justify-center h-56 cursor-pointer hover:opacity-90 transition-all duration-200"
          >
            <video
              id="video_preview"
              class="hidden w-full h-full rounded-2xl object-cover"
              controls
            ></video>
            <div
              id="video_placeholder"
              class="flex flex-col items-center gap-2"
            >
              <i data-lucide="cloud-upload" class="w-14 h-14 text-gray-300"></i>
              <p class="text-gray-400 text-sm font-medium">Upload video</p>
            </div>
          </div>
          <input
            type="file"
            name="video_file"
            id="id_video_file"
            accept="video/*"
            class="hidden"
          />
          <p
            class="text-red-500 text-xs mt-1 hidden flex items-center gap-1"
            id="err_video"
          >
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Required field
          </p>
        </div>

        <!-- Upload Thumbnail -->
        <div>
          <div
            id="thumb_drop_area"
            onclick="document.getElementById('id_thumbnail').click()"
            class="w-full bg-white border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center h-56 cursor-pointer hover:opacity-90 transition-all duration-200"
          >
            <img
              id="thumb_preview"
              class="hidden w-full h-full rounded-2xl object-cover"
              alt="Thumbnail"
            />
            <div
              id="thumb_placeholder"
              class="flex flex-col items-center gap-2"
            >
              <i data-lucide="cloud-upload" class="w-14 h-14 text-gray-300"></i>
              <p class="text-gray-400 text-sm font-medium">Upload Thumbnail</p>
            </div>
          </div>
          <input
            type="file"
            name="thumbnail"
            id="id_thumbnail"
            accept="image/*"
            class="hidden"
          />
          <p
            class="text-red-500 text-xs mt-1 hidden flex items-center gap-1"
            id="err_thumb"
          >
            <i data-lucide="alert-circle" class="w-3 h-3"></i> Required field
          </p>
        </div>

        <!-- UPLOAD Button -->
        <button
          type="button"
          id="uploadBtn"
          class="w-full bg-red-600 text-white py-4 rounded-xl font-bold text-base tracking-widest border-2 border-red-600 hover:bg-white hover:text-red-600 active:scale-95 transition-all duration-200 cursor-pointer"
        >
          UPLOAD
        </button>
      </div>
    </div>

    <!-- Success Message -->
    <div
      id="success_msg"
      class="hidden mt-6 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl flex items-center gap-2"
    >
      <i data-lucide="circle-check" class="w-5 h-5"></i>
      Video uploaded successfully!
    </div>
  </form>
</div>

<script>
  // --- Video Preview ---
  document
    .getElementById("id_video_file")
    .addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const preview = document.getElementById("video_preview");
        preview.src = URL.createObjectURL(file);
        preview.classList.remove("hidden");
        document.getElementById("video_placeholder").classList.add("hidden");
        document.getElementById("err_video").classList.add("hidden");
        const area = document.getElementById("video_drop_area");
        area.classList.remove("border-red-500", "bg-gray-200");
        area.classList.add("border-gray-200", "bg-white");
      }
    });

  // --- Thumbnail Preview ---
  document
    .getElementById("id_thumbnail")
    .addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const preview = document.getElementById("thumb_preview");
          preview.src = e.target.result;
          preview.classList.remove("hidden");
          document.getElementById("thumb_placeholder").classList.add("hidden");
          document.getElementById("err_thumb").classList.add("hidden");
          const area = document.getElementById("thumb_drop_area");
          area.classList.remove("border-red-500", "bg-gray-200");
          area.classList.add("border-gray-200", "bg-white");
        };
        reader.readAsDataURL(file);
      }
    });

  // --- Validation & Submit ---
  document.getElementById("uploadBtn").addEventListener("click", function () {
    let valid = true;

    // All required text/select/textarea fields
    [
      { id: "id_title", err: "err_title" },
      { id: "id_description", err: "err_description" },
      { id: "id_quality", err: "err_quality" },
      { id: "id_publish_date", err: "err_publish_date" },
    ].forEach((f) => {
      const el = document.getElementById(f.id);
      const err = document.getElementById(f.err);
      if (!el.value.trim()) {
        el.classList.add("border-red-500", "bg-red-50");
        err.classList.remove("hidden");
        err.classList.add("flex");
        valid = false;
      } else {
        el.classList.remove("border-red-500", "bg-red-50");
        err.classList.add("hidden");
        err.classList.remove("flex");
      }
    });

    // Video validation
    const videoArea = document.getElementById("video_drop_area");
    if (!document.getElementById("id_video_file").files.length) {
      videoArea.classList.add("border-red-500", "bg-gray-200");
      videoArea.classList.remove("border-gray-200", "bg-white");
      const err = document.getElementById("err_video");
      err.classList.remove("hidden");
      err.classList.add("flex");
      valid = false;
    } else {
      videoArea.classList.remove("border-red-500", "bg-gray-200");
      videoArea.classList.add("border-gray-200", "bg-white");
      document.getElementById("err_video").classList.add("hidden");
    }

    // Thumbnail validation
    const thumbArea = document.getElementById("thumb_drop_area");
    if (!document.getElementById("id_thumbnail").files.length) {
      thumbArea.classList.add("border-red-500", "bg-gray-200");
      thumbArea.classList.remove("border-gray-200", "bg-white");
      const err = document.getElementById("err_thumb");
      err.classList.remove("hidden");
      err.classList.add("flex");
      valid = false;
    } else {
      thumbArea.classList.remove("border-red-500", "bg-gray-200");
      thumbArea.classList.add("border-gray-200", "bg-white");
      document.getElementById("err_thumb").classList.add("hidden");
    }

    if (valid) {
      document.getElementById("uploadForm").submit();
    }
  });

  // --- Clear errors on input/change for all fields ---
  ["id_title", "id_description", "id_quality", "id_publish_date"].forEach(
    (id) => {
      ["input", "change"].forEach((evt) => {
        document.getElementById(id).addEventListener(evt, function () {
          this.classList.remove("border-red-500", "bg-red-50");
          const map = {
            id_title: "err_title",
            id_description: "err_description",
            id_quality: "err_quality",
            id_publish_date: "err_publish_date",
          };
          const err = document.getElementById(map[id]);
          if (err) {
            err.classList.add("hidden");
            err.classList.remove("flex");
          }
        });
      });
    },
  );
</script>
{% endblock %}
