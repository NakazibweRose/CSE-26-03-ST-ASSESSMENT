{% extends 'web/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 py-8">

  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'video_list' %}" class="flex items-center gap-3">
      <div class="bg-red-600 rounded-full w-9 h-9 flex items-center justify-center">
        <i data-lucide="play" class="text-white w-5 h-5 ml-0.5"></i>
      </div>
      <span class="text-2xl font-bold text-red-600">Videx</span>
    </a>
  </div>

  <video controls class="w-full rounded-xl bg-black aspect-video"
         poster="{% if video.thumbnail %}{{ video.thumbnail.url }}{% endif %}">
    <source src="{{ video.video_file.url }}" type="video/mp4"/>
    Your browser does not support the video tag.
  </video>

  <div class="mt-4">
    <h1 class="text-2xl font-bold text-gray-800">{{ video.title }}</h1>
    <div class="flex items-center gap-4 text-gray-500 text-sm mt-2">
      <span class="flex items-center gap-1">
        <i data-lucide="eye" class="w-4 h-4"></i> {{ video.views }} views
      </span>
      <span class="flex items-center gap-1">
        <i data-lucide="calendar" class="w-4 h-4"></i> {{ video.publishing_date|date:"M d, Y" }}
      </span>
      <span class="flex items-center gap-1">
        <i data-lucide="settings-2" class="w-4 h-4"></i> {{ video.quality }}
      </span>
    </div>
    {% if video.description %}
    <p class="mt-4 text-gray-700">{{ video.description }}</p>
    {% endif %}
  </div>

  <a href="{% url 'video_list' %}" class="inline-flex items-center gap-2 mt-6 text-red-500 hover:underline">
    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Videos
  </a>
</div>
{% endblock %}
